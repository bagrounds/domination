name: CI

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm

      - name: Install system dependencies
        run: |
          # spago binary is linked against libtinfo.so.5 which is unavailable on Ubuntu 24.04
          # Create a symlink from libtinfo.so.6 (available) to libtinfo.so.5 (expected)
          sudo ln -sf /lib/x86_64-linux-gnu/libtinfo.so.6 /lib/x86_64-linux-gnu/libtinfo.so.5

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
