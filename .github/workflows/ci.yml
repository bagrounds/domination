name: CI

on:
  push:
    branches-ignore:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libncurses5

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
