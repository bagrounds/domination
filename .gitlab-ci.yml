{
  "image": "node:16",
  "stages": [
    "test",
    "deploy"
  ],
  "test": {
    "stage": "test",
    "script": ["apt-get update", "apt-get install -y libncurses5", "npm ci", "npm run test"],
    "except": ["master"]
  },
  "pages": {
    "stage": "deploy",
    "script": ["apt-get update", "apt-get install -y libncurses5", "npm run deploy"],
    "environment": "pages",
    "artifacts": {
      "paths": ["public"]
    },
    "only": ["master"]
  }
}
